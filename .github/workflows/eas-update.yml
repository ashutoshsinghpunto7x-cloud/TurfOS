name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm install

      - name: Publish EAS Update
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://epontmmxcsualiettoxc.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwb250bW14Y3N1YWxpZXR0b3hjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM2NTMsImV4cCI6MjA5Mjg3OTY1M30.fQZBR4O9kBZHUaqp6tF9gp2TwegI1JrMKIXHlvm6nTs
        run: eas update --channel preview --message "$(echo '${{ github.event.head_commit.message }}' | head -1)" --non-interactive
